<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>502 - Bad Gateway</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Cinzel:wght@400;700&family=Quicksand:wght@400;600;700&family=Courier+Prime:wght@400;700&family=Fredoka:wght@400;600;700&family=Pacifico&family=Bangers&family=Lobster&family=Permanent+Marker&family=Comfortaa:wght@300;400;700&family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
   <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/night-mode.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3b48">
  <style>
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .countdown { animation: pulse 1s ease-in-out infinite; font-weight: 800; font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="app-container">
    <div class="mobile-header"><button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button><div class="header-logo"><i class="fas fa-network-wired"></i><span>ERROR 502</span></div><div class="theme-btn-header" id="themeBtn"><i class="fas fa-palette"></i><span>Theme</span></div></div>
    <div class="sheet-overlay" id="sheetOverlay"></div><div class="bottom-sheet" id="bottomSheet"><div class="bottom-sheet-header"><h3><i class="fas fa-brush"></i> Theme</h3><button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button></div><div class="bottom-sheet-content"><div class="theme-grid-rect" id="themeGrid"></div><div class="font-row-sheet"><div class="font-sheet" data-font="small">A<sup>-</sup></div><div class="font-sheet" data-font="medium">A</div><div class="font-sheet" data-font="large">A<sup>+</sup></div></div></div></div>
    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> SMART-GRADE MENU</h3><button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
        <a href="502.html" class="nav-item active"><i class="fas fa-network-wired"></i> 502</a>
      </nav>
    </div>
    <div class="overlay" id="overlay"></div>
    <main class="main-content">
      <div class="glass-card text-center">
        <i class="fas fa-network-wired" style="font-size:60px;color:#e74c3c;"></i>
        <h1 style="font-size:5rem;font-weight:800;background:linear-gradient(135deg,#e74c3c,#9b59b6);-webkit-background-clip:text;background-clip:text;color:transparent;">502</h1>
        <p style="font-size:1rem;font-weight:600;">Bad Gateway</p>
        <p style="font-size:0.75rem;color:var(--text-light);margin-top:5px;">The server received an invalid response from the upstream server.</p>
        <p style="font-size:0.7rem;color:var(--text-light);margin-top:15px;">Redirecting to home page in <strong id="countdown" class="countdown">30</strong> seconds</p>
        <div style="margin-top:20px;"><a href="index.html" class="btn btn-primary" style="display:inline-flex;width:auto;padding:12px 24px;"><i class="fas fa-home"></i> Go to Home</a></div>
      </div>
    </main>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <script src="js/utils.js"></script><script src="js/database.js"></script><script src="js/app.js"></script>
  <script>
    initParticles(); initThemeSelector(); initMobileMenu();
    var seconds = 30, countdownEl = document.getElementById('countdown'), timer = setInterval(function() { seconds--; if (countdownEl) countdownEl.innerHTML = seconds; if (seconds <= 0) { clearInterval(timer); window.location.href = 'index.html'; } }, 1000);
  </script>
  <!-- PWA Manager -->
  <script src="js/pwa.js" defer></script>
</body>
</html>
