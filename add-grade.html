<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Add Grade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Cinzel:wght@400;700&family=Quicksand:wght@400;600;700&family=Courier+Prime:wght@400;700&family=Fredoka:wght@400;600;700&family=Pacifico&family=Bangers&family=Lobster&family=Permanent+Marker&family=Comfortaa:wght@300;400;700&family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/night-mode.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3b48">
  <style>
    /* ============================================
       ADD GRADE - STYLE UNIQUE
       ============================================ */

    /* HERO SPÉCIFIQUE */
    .grade-hero {
      text-align: center;
      padding: 28px 20px;
      border-radius: 24px;
      color: white;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      position: relative;
      overflow: hidden;
    }

    .grade-hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
      animation: stripeMove 3s linear infinite;
      z-index: 0;
    }

    @keyframes stripeMove {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    .grade-hero > * { position: relative; z-index: 1; }
    .grade-hero h2 { color: white; font-size: 1.3rem; margin: 4px 0; }
    .grade-hero p { opacity: 0.85; font-size: 0.7rem; color: white; }
    .grade-hero .hero-icon {
      font-size: 32px;
      opacity: 0.4;
      display: block;
      margin-bottom: 4px;
    }

    /* ============================================
       FORMULAIRE
       ============================================ */

    .form-container {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .form-container:hover {
      border-color: var(--primary);
    }

    /* ============================================
       CHAMPS DE SAISIE
       ============================================ */

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-field label i {
      color: var(--primary);
      width: 18px;
      text-align: center;
      font-size: 0.7rem;
    }

    .form-field select,
    .form-field input,
    .form-field textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 0.85rem;
      color: var(--text);
      transition: all 0.3s ease;
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-field select:focus,
    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15,59,72,0.06);
      outline: none;
    }

    .form-field textarea {
      min-height: 70px;
      resize: vertical;
    }

    .form-field .hint {
      font-size: 0.55rem;
      color: var(--text-light);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-field .hint i {
      font-size: 0.5rem;
      color: var(--primary);
    }

    /* ============================================
       SÉQUENCES - STYLE UNIQUE
       ============================================ */

    .seq-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .seq-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }

    .seq-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }

    .seq-card:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
    }

    .seq-card:active {
      transform: scale(0.95);
    }

    .seq-card.selected {
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 20px rgba(15,59,72,0.2);
    }

    .seq-card.selected::after {
      opacity: 1;
    }

    .seq-card.selected .seq-num,
    .seq-card.selected .seq-term {
      position: relative;
      z-index: 1;
      color: white;
    }

    .seq-card.selected .seq-term {
      opacity: 0.7;
    }

    .seq-num {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      position: relative;
      z-index: 0;
      transition: color 0.3s ease;
    }

    .seq-term {
      font-size: 0.5rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
      position: relative;
      z-index: 0;
      transition: color 0.3s ease;
    }

    .seq-check {
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 0.5rem;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
      z-index: 2;
    }

    .seq-card.selected .seq-check {
      opacity: 1;
      transform: scale(1);
      color: white;
    }

    /* ============================================
       PRÉVISUALISATION
       ============================================ */

    .preview-box {
      background: rgba(0,0,0,0.02);
      border-radius: 16px;
      padding: 16px 20px;
      margin: 16px 0;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .preview-box:hover {
      border-color: var(--primary);
    }

    .preview-title {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .preview-grade {
      font-size: 2.5rem;
      font-weight: 800;
      font-family: 'Courier Prime', monospace;
      color: var(--primary);
      transition: color 0.3s ease;
    }

    .preview-grade.excellent { color: #2ecc71; }
    .preview-grade.verygood { color: #3498db; }
    .preview-grade.good { color: #f39c12; }
    .preview-grade.average { color: #e67e22; }
    .preview-grade.needs { color: #e74c3c; }

    .preview-subject {
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 4px;
    }

    .preview-detail {
      font-size: 0.6rem;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ============================================
       BOUTONS
       ============================================ */

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn-row .btn {
      flex: 1;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
    }

    .btn-row .btn:active { transform: scale(0.96); }

    .btn-cancel {
      background: rgba(0,0,0,0.04);
      color: var(--text);
      border: 2px solid var(--border) !important;
    }

    .btn-cancel:hover {
      background: rgba(0,0,0,0.08);
    }

    .btn-save {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 4px 20px rgba(15,59,72,0.15);
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(15,59,72,0.2);
    }

    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================
       RESPONSIVE
       ============================================ */

    @media (max-width: 550px) {
      .seq-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .seq-card {
        padding: 10px 4px;
      }
      .seq-num { font-size: 0.9rem; }
      .btn-row { flex-direction: column; }
      .preview-grade { font-size: 2rem; }
    }

    @media (max-width: 400px) {
      .seq-grid { gap: 6px; }
      .seq-card { padding: 8px 2px; }
      .seq-num { font-size: 0.8rem; }
      .form-field { margin-bottom: 12px; }
      .form-field select,
      .form-field input { padding: 10px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="app-container">

    <!-- ============================================

         THEME SHEET
    ============================================ -->
    <div class="sheet-overlay" id="sheetOverlay"></div>

      <div class="bottom-sheet-header"><h3><i class="fas fa-brush"></i> Theme</h3><button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button></div>

      </div>

    <!-- ============================================
         SIDEBAR
    ============================================ -->
    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> SMART GRADE</h3><button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chalkboard-user"></i> Dashboard</a>

    ============================================ -->

      <!-- HERO -->

  <script>
    // ============================================
    // ADD GRADE - LOGIQUE
    // ============================================

    var currentUser = null;
    var selectedSequence = 1;
    var editGradeId = null;

    var SUBJECTS = [
      { id: 1, name: "COMPUTER SCIENCES", icon: "fa-laptop-code" },
      { id: 2, name: "MATHEMATICS", icon: "fa-square-root-variable" },
      { id: 3, name: "CHEMISTRY", icon: "fa-flask" },
      { id: 4, name: "HUMAN BIOLOGY", icon: "fa-dna" },
      { id: 5, name: "GEOLOGY", icon: "fa-mountain" },
      { id: 6, name: "PHYSICS", icon: "fa-atom" },
      { id: 7, name: "ADDITIONAL MATHEMATICS", icon: "fa-calculator" },
      { id: 8, name: "BIOLOGY", icon: "fa-leaf" },
      { id: 9, name: "ECONOMICS", icon: "fa-chart-line" },
      { id: 10, name: "ENGLISH LANGUAGE", icon: "fa-language" },
      { id: 11, name: "GEOGRAPHY", icon: "fa-earth-africa" },
      { id: 12, name: "CITIZENSHIP", icon: "fa-landmark" },
      { id: 13, name: "FRENCH", icon: "fa-flag" },
      { id: 14, name: "FOOD AND NUTRITION", icon: "fa-apple-whole" }
    ];

    // ============================================
    // INIT
    // ============================================

    function init() {
      currentUser = getCurrentStudent();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      loadSubjects();
      initSequence();
      loadEditGrade();
      updatePreview();

      document.getElementById('gradeDate').value = new Date().toISOString().split('T')[0];

      document.getElementById('subjectSelect').addEventListener('change', updatePreview);
      document.getElementById('gradeValue').addEventListener('input', updatePreview);
      document.getElementById('gradeForm').addEventListener('submit', handleSubmit);

      updateHeaderAvatar();
    }

    // ============================================
    // CHARGER LES MATIÈRES
    // ============================================

    function loadSubjects() {
      var select = document.getElementById('subjectSelect');
      select.innerHTML = '<option value="">-- Select a subject --</option>';
      for (var i = 0; i < SUBJECTS.length; i++) {
        var opt = document.createElement('option');
        opt.value = SUBJECTS[i].id;
        opt.textContent = SUBJECTS[i].name;
        select.appendChild(opt);
      }
    }

    // ============================================
    // SÉLECTEUR DE SÉQUENCE
    // ============================================

    function initSequence() {
      var cards = document.querySelectorAll('.seq-card');
      cards.forEach(function(card) {
        card.addEventListener('click', function() {
          cards.forEach(function(c) { c.classList.remove('selected'); });
          this.classList.add('selected');
          selectedSequence = parseInt(this.dataset.seq);
          document.getElementById('sequenceSelect').value = selectedSequence;
          updatePreview();
        });
      });
      if (cards.length) {
        cards[0].classList.add('selected');
        selectedSequence = 1;
        document.getElementById('sequenceSelect').value = 1;
      }
    }

    // ============================================
    // CHARGER UNE NOTE À MODIFIER
    // ============================================

    function loadEditGrade() {
      var params = new URLSearchParams(window.location.search);
      editGradeId = parseInt(params.get('gradeId'));

      if (editGradeId) {
        var grades = getStudentGrades(currentUser.id);
        var grade = null;
        for (var i = 0; i < grades.length; i++) {
          if (grades[i].id === editGradeId) {
            grade = grades[i];
            break;
          }
        }

        if (grade) {
          document.getElementById('subjectSelect').value = grade.subjectId;
          document.getElementById('gradeValue').value = grade.value;
          document.getElementById('gradeDate').value = grade.date || new Date().toISOString().split('T')[0];
          document.getElementById('gradeNotes').value = grade.notes || '';

          var cards = document.querySelectorAll('.seq-card');
          cards.forEach(function(c) {
            c.classList.remove('selected');
            if (parseInt(c.dataset.seq) === grade.sequenceId) {
              c.classList.add('selected');
              selectedSequence = grade.sequenceId;
              document.getElementById('sequenceSelect').value = selectedSequence;
            }
          });

          document.querySelector('.btn-save').innerHTML = '<i class="fas fa-edit"></i> Update Grade';
        }
      }
    }

    // ============================================
    // PRÉVISUALISATION
    // ============================================

    function updatePreview() {
      var subjectId = parseInt(document.getElementById('subjectSelect').value);
      var value = parseFloat(document.getElementById('gradeValue').value);

      var subject = null;
      for (var i = 0; i < SUBJECTS.length; i++) {
        if (SUBJECTS[i].id === subjectId) {
          subject = SUBJECTS[i];
          break;
        }
      }

      var gradeEl = document.getElementById('previewGrade');
      var subjectEl = document.getElementById('previewSubject');
      var detailEl = document.getElementById('previewDetail');

      if (subject && !isNaN(value) && value >= 0) {
        gradeEl.textContent = value.toFixed(2) + ' / 20';
        gradeEl.className = 'preview-grade';
        if (value >= 16) gradeEl.classList.add('excellent');
        else if (value >= 14) gradeEl.classList.add('verygood');
        else if (value >= 12) gradeEl.classList.add('good');
        else if (value >= 10) gradeEl.classList.add('average');
        else gradeEl.classList.add('needs');

        subjectEl.textContent = subject.name;
        detailEl.textContent = 'Sequence ' + selectedSequence + ' • Term ' + Math.ceil(selectedSequence / 2);
      } else if (subject) {
        gradeEl.textContent = '— / 20';
        gradeEl.className = 'preview-grade';
        subjectEl.textContent = subject.name;
        detailEl.textContent = 'Sequence ' + selectedSequence + ' • Term ' + Math.ceil(selectedSequence / 2);
      } else {
        gradeEl.textContent = '— / 20';
        gradeEl.className = 'preview-grade';
        subjectEl.textContent = 'Select a subject';
        detailEl.textContent = '';
      }
    }

    // ============================================
    // SOUMISSION
    // ============================================

    function handleSubmit(e) {
      e.preventDefault();

      var subjectId = parseInt(document.getElementById('subjectSelect').value);
      var value = parseFloat(document.getElementById('gradeValue').value);
      var date = document.getElementById('gradeDate').value;
      var notes = document.getElementById('gradeNotes').value.trim();

      if (!subjectId) { showToast('Please select a subject'); return; }
      if (isNaN(value) || value < 0 || value > 20) { showToast('Grade must be between 0 and 20'); return; }
      if (value.toString().split('.')[1] && value.toString().split('.')[1].length > 2) {
        showToast('Maximum 2 decimal places');
        return;
      }

      var btn = document.getElementById('saveBtn');
      var original = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Saving...';
      btn.disabled = true;

      setTimeout(function() {
        var grades = getStudentGrades(currentUser.id);

        var subjectName = '';
        for (var i = 0; i < SUBJECTS.length; i++) {
          if (SUBJECTS[i].id === subjectId) { subjectName = SUBJECTS[i].name; break; }
        }

        if (editGradeId) {
          for (var i = 0; i < grades.length; i++) {
            if (grades[i].id === editGradeId) {
              grades[i].subjectId = subjectId;
              grades[i].sequenceId = selectedSequence;
              grades[i].value = Math.round(value * 100) / 100;
              grades[i].date = date;
              grades[i].notes = notes;
              break;
            }
          }
          saveStudentGrades(currentUser.id, grades);
          addHistory(currentUser.id, 'Grade updated: ' + subjectName + ' → ' + value.toFixed(2));
          showToast('✅ Grade updated!');
        } else {
          var newId = Date.now();
          grades.push({
            id: newId,
            subjectId: subjectId,
            sequenceId: selectedSequence,
            value: Math.round(value * 100) / 100,
            date: date,
            notes: notes
          });
          saveStudentGrades(currentUser.id, grades);
          addHistory(currentUser.id, 'Grade added: ' + subjectName + ' → ' + value.toFixed(2));
          showToast('✅ Grade saved!');
          checkAndUnlockAllNewBadges(currentUser.id);
        }

        btn.innerHTML = original;
        btn.disabled = false;

        setTimeout(function() {
          window.location.href = 'subject-detail.html?id=' + subjectId;
        }, 600);

      }, 400);
    }

    // ============================================
    // AVATAR
    // ============================================

    function updateHeaderAvatar() {
      try {
        var profile = JSON.parse(localStorage.getItem('smartgrade_profile_' + currentUser.id) || '{}');
        var avatar = document.getElementById('headerAvatar');
        if (profile.avatarBase64 && profile.avatarBase64.length > 100) {
          avatar.innerHTML = '<img src="' + profile.avatarBase64 + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
        }
      } catch(e) {}
    }

    // ============================================
    // INIT
    // ============================================

    init();
    initMobileMenu();
    initThemeSelector();

    setTimeout(function() {
      if (typeof applyGlobalFont === 'function') applyGlobalFont();
    }, 100);
  </script>
  <!-- PWA Manager -->
  <script src="js/pwa.js" defer></script>
