<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Subjects</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Cinzel:wght@400;700&family=Quicksand:wght@400;600;700&family=Courier+Prime:wght@400;700&family=Fredoka:wght@400;600;700&family=Pacifico&family=Bangers&family=Lobster&family=Permanent+Marker&family=Comfortaa:wght@300;400;700&family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/night-mode.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <meta name="theme-color" content="#0f3b48">
  <style>
    /* ============================================
       STYLES GÉNÉRAUX
       ============================================ */
    
    .subjects-header-card {
      text-align: center;
      padding: 24px 16px;
      border-radius: 20px;
      color: white;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .subjects-header-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
      animation: stripeMove 3s linear infinite;
      z-index: 0;
    }
    @keyframes stripeMove { 0%{background-position:0 0} 100%{background-position:40px 0} }
    .subjects-header-card > * { position: relative; z-index: 1; }
    
    .subjects-big-number {
      font-size: 2.8rem;
      font-weight: 800;
    }
    .subjects-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.8;
    }
    .subjects-count-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.6rem;
      margin-top: 4px;
    }
    
    /* Navigation */
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 4px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--text-light);
      font-weight: 600;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 2px 8px rgba(15,59,72, 0.2);
    }
    .tab-btn:active { transform: scale(0.95); }
    
    /* Slides */
    .slides-wrapper { flex: 1; overflow: hidden; position: relative; touch-action: pan-y; }
    .slides-container { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; }
    .slide { min-width: 100%; padding: 0 4px; overflow-y: auto; max-height: calc(100vh - 260px); }
    .slide::-webkit-scrollbar { width: 3px; }
    .slide::-webkit-scrollbar-track { background: var(--border); border-radius: 3px; }
    .slide::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    
    /* ============================================
       SLIDE 1 : OVERVIEW
       ============================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      text-align: center;
      padding: 16px 8px;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }
    .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .stat-icon { font-size: 1.4rem; margin-bottom: 4px; display: block; }
    .stat-icon.total { color: #3498db; }
    .stat-icon.avg { color: #2ecc71; }
    .stat-icon.best { color: #f39c12; }
    .stat-icon.worst { color: #e74c3c; }
    .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 0.5rem; text-transform: uppercase; color: var(--text-light); margin-top: 2px; letter-spacing: 0.5px; }
    
    .search-box-simple {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .search-box-simple input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    .search-box-simple input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15,59,72, 0.08);
    }
    .search-box-simple input::placeholder {
      color: var(--text-light);
      opacity: 0.5;
    }
    
    /* ============================================
       SLIDE 2 : CHARTS
       ============================================ */
    .chart-box-full {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }
    .chart-box-full:hover { border-color: var(--primary); }
    .chart-box-full h4 {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      color: var(--text-light);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .chart-box-full h4 i { color: var(--primary); }
    .chart-box-full canvas { width: 100% !important; max-height: 200px; }
    
    /* ============================================
       SLIDE 3 : SUBJECTS LIST
       ============================================ */
    .subjects-grid-modern {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-bottom: 8px;
    }
    .subject-card-new {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid var(--border);
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
    }
    .subject-card-new:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .subject-card-new .sc-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .subject-card-new .sc-name {
      font-weight: 700;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subject-card-new .sc-name .icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.6rem;
      flex-shrink: 0;
    }
    .subject-card-new .sc-grade {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
    }
    .subject-card-new .sc-grade.excellent { color: #2ecc71; }
    .subject-card-new .sc-grade.verygood { color: #3498db; }
    .subject-card-new .sc-grade.good { color: #f39c12; }
    .subject-card-new .sc-grade.average { color: #e67e22; }
    .subject-card-new .sc-grade.needs { color: #e74c3c; }
    
    .subject-card-new .sc-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .subject-card-new .sc-status {
      font-size: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .subject-card-new .sc-status.excellent { color: #2ecc71; }
    .subject-card-new .sc-status.verygood { color: #3498db; }
    .subject-card-new .sc-status.good { color: #f39c12; }
    .subject-card-new .sc-status.average { color: #e67e22; }
    .subject-card-new .sc-status.needs { color: #e74c3c; }
    
    .subject-card-new .sc-coeff {
      font-size: 0.5rem;
      color: var(--text-light);
      background: rgba(0,0,0,0.04);
      padding: 2px 10px;
      border-radius: 20px;
    }
    .subject-card-new .sc-grades-count {
      font-size: 0.5rem;
      color: var(--text-light);
    }
    .sc-progress-small {
      height: 3px;
      background: rgba(0,0,0,0.06);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .sc-progress-small .fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-light);
    }
    .empty-state i { font-size: 40px; opacity: 0.15; margin-bottom: 10px; display: block; }
    .empty-state p { font-size: 0.7rem; }
    
    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 600px) {
      .subjects-big-number { font-size: 2.2rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 1.3rem; }
      .subjects-grid-modern { grid-template-columns: 1fr; }
      .chart-box-full canvas { max-height: 180px; }
    }
    @media (max-width: 400px) {
      .stats-grid { gap: 6px; }
      .stat-card { padding: 10px 4px; }
      .stat-value { font-size: 1rem; }
      .subject-card-new { padding: 10px; }
      .subject-card-new .sc-grade { font-size: 1rem; }
    }
  </style>
</head>

  <script>
    // ============================================
    // VARIABLES
    // ============================================
    
    var sc = ['#3498db','#e74c3c','#9b59b6','#2ecc71','#e67e22','#00bcd4','#f39c12','#1abc9c','#27ae60','#2980b9','#c0392b','#8e44ad','#16a085','#d35400'];
    var allSubs = [
      { id: 1, name: "COMPUTER SCIENCES", icon: "fa-laptop-code" },
      { id: 2, name: "MATHEMATICS", icon: "fa-square-root-variable" },
      { id: 3, name: "CHEMISTRY", icon: "fa-flask" },
      { id: 4, name: "HUMAN BIOLOGY", icon: "fa-dna" },
      { id: 5, name: "GEOLOGY", icon: "fa-mountain" },
      { id: 6, name: "PHYSICS", icon: "fa-atom" },
      { id: 7, name: "ADDITIONAL MATHEMATICS", icon: "fa-calculator" },
      { id: 8, name: "BIOLOGY", icon: "fa-leaf" },
      { id: 9, name: "ECONOMICS", icon: "fa-chart-line" },
      { id: 10, name: "ENGLISH LANGUAGE", icon: "fa-language" },
      { id: 11, name: "GEOGRAPHY", icon: "fa-earth-africa" },
      { id: 12, name: "CITIZENSHIP", icon: "fa-landmark" },
      { id: 13, name: "FRENCH", icon: "fa-flag" },
      { id: 14, name: "FOOD AND NUTRITION", icon: "fa-apple-whole" }
    ];
    
    var barChart = null;
    var distChart = null;
    var currentSlide = 0;
    var totalSlides = 3;
    var touchStartX = 0;
    var touchStartY = 0;
    var isSwiping = false;
    var allSubjectData = [];
    var currentTerm = 1;
    var yearlyMode = false;
    
    // ============================================
    // SWIPE / NAVIGATION
    // ============================================
    
    function goToSlide(index) {
      if (index < 0) index = 0;
      if (index >= totalSlides) index = totalSlides - 1;
      currentSlide = index;
      document.getElementById('slidesContainer').style.transform = 'translateX(-' + (index * 100) + '%)';
      
      document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
        btn.classList.toggle('active', i === index);
      });
    }
    
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        goToSlide(parseInt(this.dataset.tab));
      });
    });
    
    var wrapper = document.getElementById('slidesWrapper');
    wrapper.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      isSwiping = false;
    }, { passive: true });
    
    wrapper.addEventListener('touchmove', function(e) {
      var deltaX = e.touches[0].clientX - touchStartX;
      var deltaY = e.touches[0].clientY - touchStartY;
      if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 20) {
        isSwiping = true;
        e.preventDefault();
      }
    }, { passive: false });
    
    wrapper.addEventListener('touchend', function(e) {
      if (!isSwiping) return;
      var deltaX = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(deltaX) > 50) {
        if (deltaX < 0 && currentSlide < totalSlides - 1) goToSlide(currentSlide + 1);
        else if (deltaX > 0 && currentSlide > 0) goToSlide(currentSlide - 1);
      }
      isSwiping = false;
    }, { passive: true });
    
    // ============================================
    // AVATAR
    // ============================================
    
    function loadHeaderAvatar() {
      var current = JSON.parse(localStorage.getItem('smartgrade_current') || 'null');
      if (!current) return;
      
      var profile = JSON.parse(localStorage.getItem('smartgrade_profile_' + current.id) || '{}');
      var headerAvatar = document.getElementById('headerAvatar');
      
      if (profile.avatarBase64 && profile.avatarBase64 !== '' && profile.avatarBase64.length > 100) {
        headerAvatar.innerHTML = '<img src="' + profile.avatarBase64 + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
      } else {
        var gender = current.gender || 'boy';
        var defaultAvatar = gender === 'girl' ? './icons/avatar-girl.png' : './icons/avatar-boy.png';
        headerAvatar.innerHTML = '<img src="' + defaultAvatar + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
      }
    }
    
    // ============================================
    // CALCULS
    // ============================================
    
    function getSequencesForTerm(term) {
      var s = (term - 1) * 2 + 1;
      return [s, s + 1];
    }
    
    function calculateSubjectAvg(subjectId, term, grades) {
      var seq = getSequencesForTerm(term);
      var n1 = [], n2 = [];
      for (var k = 0; k < grades.length; k++) {
        if (grades[k].subjectId === subjectId && grades[k].sequenceId === seq[0]) n1.push(grades[k].value);
        if (grades[k].subjectId === subjectId && grades[k].sequenceId === seq[1]) n2.push(grades[k].value);
      }
      var a1 = 0, a2 = 0;
      if (n1.length > 0) { var sum = 0; for (var j = 0; j < n1.length; j++) sum += n1[j]; a1 = sum / n1.length; }
      if (n2.length > 0) { var sum = 0; for (var j = 0; j < n2.length; j++) sum += n2[j]; a2 = sum / n2.length; }
      var avg = (a1 + a2) / 2;
      return avg;
    }
    
    function loadSubjects() {
      var current = JSON.parse(localStorage.getItem('smartgrade_current') || 'null');
      if (!current) { location = 'login.html'; return; }
      var sid = current.id;
      var grades = JSON.parse(localStorage.getItem('smartgrade_grades_' + sid) || '[]');
      var selected = JSON.parse(localStorage.getItem('smartgrade_selected_' + sid + '_term' + currentTerm) || '[]');
      var coeffs = JSON.parse(localStorage.getItem('smartgrade_coeffs_' + sid) || '{}');
      
      loadHeaderAvatar();
      
      var subjectData = [];
      var totalWeighted = 0;
      var totalCoeff = 0;
      var best = { name: '--', avg: -1 };
      var worst = { name: '--', avg: 21 };
      var hasGrades = false;
      
      for (var i = 0; i < allSubs.length; i++) {
        var s = allSubs[i];
        var isSelected = selected.indexOf(s.id) !== -1;
        if (!isSelected) continue;
        
        var avg = calculateSubjectAvg(s.id, currentTerm, grades);
        var coeff = coeffs[s.id] || 5;
        var gradeCount = 0;
        for (var k = 0; k < grades.length; k++) {
          if (grades[k].subjectId === s.id) gradeCount++;
        }
        
        subjectData.push({
          id: s.id,
          name: s.name,
          icon: s.icon,
          avg: avg,
          coeff: coeff,
          gradeCount: gradeCount,
          color: sc[i % sc.length]
        });
        
        if (gradeCount > 0) {
          hasGrades = true;
          totalWeighted += avg * coeff;
          totalCoeff += coeff;
          if (avg > best.avg && avg > 0) { best = { name: s.name, avg: avg }; }
          if (avg < worst.avg && avg > 0) { worst = { name: s.name, avg: avg }; }
        }
      }
      
      var overallAvg = totalCoeff > 0 ? Math.round((totalWeighted / totalCoeff) * 100) / 100 : 0;
      
      document.getElementById('overallAvg').innerHTML = overallAvg.toFixed(2);
      document.getElementById('subjectsCount').innerHTML = subjectData.length + ' subjects';
      
      document.getElementById('statTotal').innerHTML = subjectData.length;
      document.getElementById('statAvg').innerHTML = overallAvg.toFixed(2);
      document.getElementById('statBest').innerHTML = best.avg > 0 ? best.avg.toFixed(2) : '--';
      document.getElementById('statWorst').innerHTML = worst.avg < 21 ? worst.avg.toFixed(2) : '--';
      
      allSubjectData = subjectData;
      
      // Afficher les matières (aperçu)
      renderSubjectsPreview(subjectData);
      
      // Afficher toutes les matières
      renderSubjectsFull(subjectData);
      
      // Graphiques
      updateCharts(subjectData);
    }
    
    // ============================================
    // RENDER SUBJECTS
    // ============================================
    
    function renderSubjectsPreview(data) {
      var container = document.getElementById('subjectsPreview');
      var displayData = data.slice(0, 6);
      container.innerHTML = renderSubjectCards(displayData);
    }
    
    function renderSubjectsFull(data) {
      var container = document.getElementById('subjectsFullList');
      container.innerHTML = renderSubjectCards(data);
    }
    
    function renderSubjectCards(data) {
      if (data.length === 0) {
        return '<div class="empty-state"><i class="fas fa-book"></i><p>No subjects selected for this term</p></div>';
      }
      
      var html = '';
      for (var i = 0; i < data.length; i++) {
        var s = data[i];
        var gradeClass = '';
        var statusClass = '';
        var statusText = '';
        if (s.avg >= 16) { gradeClass = 'excellent'; statusClass = 'excellent'; statusText = 'Excellent'; }
        else if (s.avg >= 14) { gradeClass = 'verygood'; statusClass = 'verygood'; statusText = 'Very Good'; }
        else if (s.avg >= 12) { gradeClass = 'good'; statusClass = 'good'; statusText = 'Good'; }
        else if (s.avg >= 10) { gradeClass = 'average'; statusClass = 'average'; statusText = 'Average'; }
        else if (s.avg > 0) { gradeClass = 'needs'; statusClass = 'needs'; statusText = 'Needs Work'; }
        else { gradeClass = 'needs'; statusClass = 'needs'; statusText = 'No Data'; }
        
        var progress = s.avg > 0 ? Math.min(100, Math.round((s.avg / 20) * 100)) : 0;
        var iconColor = s.color || sc[i % sc.length];
        
        html += '<div class="subject-card-new" onclick="location.href=\'subject-detail.html?id=' + s.id + '\'">';
        html += '<div class="sc-top">';
        html += '<div class="sc-name"><span class="icon" style="background:' + iconColor + ';"><i class="fas ' + s.icon + '"></i></span>' + s.name + '</div>';
        html += '<div class="sc-grade ' + gradeClass + '">' + (s.avg > 0 ? s.avg.toFixed(2) : '--') + '</div>';
        html += '</div>';
        html += '<div class="sc-progress-small"><div class="fill" style="width:' + progress + '%;background:' + iconColor + ';"></div></div>';
        html += '<div class="sc-bottom">';
        html += '<span class="sc-status ' + statusClass + '">' + statusText + '</span>';
        html += '<span class="sc-coeff">Coeff: ' + s.coeff + '</span>';
        html += '<span class="sc-grades-count">' + s.gradeCount + ' grades</span>';
        html += '</div>';
        html += '</div>';
      }
      return html;
    }
    
    // ============================================
    // FILTRES
    // ============================================
    
    function filterSubjects() {
      var query = document.getElementById('subjectSearch').value.toLowerCase();
      var filtered = allSubjectData.filter(function(s) {
        return s.name.toLowerCase().includes(query);
      });
      renderSubjectsPreview(filtered);
    }
    
    function filterSubjectsFull() {
      var query = document.getElementById('subjectSearchFull').value.toLowerCase();
      var filtered = allSubjectData.filter(function(s) {
        return s.name.toLowerCase().includes(query);
      });
      renderSubjectsFull(filtered);
    }
    
    // ============================================
    // CHARTES
    // ============================================
    
    function updateCharts(data) {
      var labels = data.map(function(d) { return d.name.substring(0, 6); });
      var values = data.map(function(d) { return d.avg; });
      var colors = data.map(function(d) { return d.color; });
      
      var isDark = document.body.classList.contains('night-mode');
      var textColor = isDark ? '#e0e0e0' : '#1a2a3a';
      var gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
      
      // Bar chart
      var ctx1 = document.getElementById('barChart');
      if (ctx1) {
        if (barChart) barChart.destroy();
        barChart = new Chart(ctx1.getContext('2d'), {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              data: values,
              backgroundColor: colors,
              borderRadius: 4,
              borderSkipped: false,
              maxBarThickness: 30
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(ctx) {
                    return data[ctx.dataIndex].name + ': ' + ctx.raw.toFixed(2) + '/20';
                  }
                }
              }
            },
            scales: {
              y: { min: 0, max: 20, ticks: { stepSize: 5, color: textColor, font: { size: 8 } }, grid: { color: gridColor } },
              x: { ticks: { color: textColor, font: { size: 8 } }, grid: { display: false } }
            },
            animation: { duration: 800, easing: 'easeOutQuart' }
          }
        });
      }
      
      // Distribution chart
      var ctx2 = document.getElementById('distChart');
      if (ctx2) {
        if (distChart) distChart.destroy();
        var dist = [0, 0, 0, 0, 0];
        for (var i = 0; i < data.length; i++) {
          var val = data[i].avg;
          if (val >= 16) dist[0]++;
          else if (val >= 14) dist[1]++;
          else if (val >= 12) dist[2]++;
          else if (val >= 10) dist[3]++;
          else if (val > 0) dist[4]++;
        }
        
        distChart = new Chart(ctx2.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: ['16-20', '14-15.9', '12-13.9', '10-11.9', '<10'],
            datasets: [{
              data: dist,
              backgroundColor: ['#2ecc71', '#3498db', '#f39c12', '#e67e22', '#e74c3c'],
              borderWidth: 2,
              borderColor: isDark ? '#1a1a2e' : '#ffffff'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'right',
                labels: { color: textColor, font: { size: 8 }, padding: 6, boxWidth: 10, usePointStyle: true, pointStyle: 'circle' }
              },
              tooltip: {
                callbacks: {
                  label: function(ctx) { return ctx.raw + ' subjects'; }
                }
              }
            },
            cutout: '55%',
            animation: { duration: 800, easing: 'easeOutQuart' }
          }
        });
      }
    }
    
    // Theme observer
    var themeObserver = new MutationObserver(function() {
      loadSubjects();
    });
    themeObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    
    loadSubjects();
    initMobileMenu();
    initThemeSelector();
    
    // Exposer les fonctions globales
    window.filterSubjects = filterSubjects;
    window.filterSubjectsFull = filterSubjectsFull;
  </script>
  <!-- PWA Manager -->
  <script src="js/pwa.js" defer></script>
</body>
