<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/night-mode.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3b48">
  <style>
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat-badge-sm {
      background: var(--card-bg);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.65rem;
      border: 1px solid var(--border);
    }
    .filter-section {
      margin-bottom: 20px;
    }
    .filter-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }
    .filter-chip i { margin-right: 6px; font-size: 0.7rem; }
    .filter-chip.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border-color: transparent;
    }
    .notif-card {
      display: flex;
      gap: 14px;
      padding: 16px;
      background: var(--card-bg);
      border-radius: 20px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .notif-card:hover {
      transform: translateX(4px);
      border-color: var(--primary);
    }
    .notif-card.unread {
      border-left: 4px solid var(--primary);
      background: rgba(15,59,72,0.03);
    }
    .notif-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      color: white;
    }
    .notif-icon.grade { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .notif-icon.badge { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .notif-icon.streak { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .notif-icon.goal { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
    .notif-icon.profile { background: linear-gradient(135deg, #3498db, #2980b9); }
    .notif-icon.backup { background: linear-gradient(135deg, #00bcd4, #0097a7); }
    .notif-icon.import { background: linear-gradient(135deg, #27ae60, #1e8449); }
    .notif-icon.export { background: linear-gradient(135deg, #2980b9, #1a5276); }
    .notif-icon.subjects { background: linear-gradient(135deg, #8e44ad, #6c3483); }
    .notif-icon.transfer { background: linear-gradient(135deg, #1abc9c, #16a085); }
    .notif-icon.account { background: linear-gradient(135deg, #e67e22, #d35400); }
    .notif-icon.flashcard { background: linear-gradient(135deg, #3498db, #2471a3); }
    .notif-icon.timetable { background: linear-gradient(135deg, #f39c12, #d68910); }
    .notif-icon.system { background: linear-gradient(135deg, #7f8c8d, #6c7a7a); }
    .notif-icon.login { background: linear-gradient(135deg, #3498db, #2471a3); }
    .notif-content { flex: 1; }
    .notif-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; }
    .notif-body { font-size: 0.7rem; color: var(--text-light); line-height: 1.4; }
    .notif-date { font-size: 0.55rem; color: var(--text-light); margin-top: 6px; display: flex; align-items: center; gap: 4px; }
    .unread-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; flex-shrink: 0; align-self: center; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .empty-state { text-align: center; padding: 50px 20px; }
    .empty-state i { font-size: 60px; opacity: 0.15; margin-bottom: 16px; display: block; }
    .action-btn {
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--border);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .action-btn:hover { background: rgba(0,0,0,0.06); }
    .action-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    @media (max-width: 550px) {
      .filter-grid { justify-content: center; }
      .action-bar { justify-content: center; }
      .stats-row { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="app-container">
    
    <div class="mobile-header">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="header-logo"><i class="fas fa-bell"></i><span>NOTIFICATIONS</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <a href="profile.html"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-size:0.8rem;" id="headerAvatar"><i class="fas fa-user-graduate"></i></div></a>
        <div class="theme-btn-header" id="themeBtn"><i class="fas fa-palette"></i><span>Theme</span></div>
      </div>
    </div>
    
    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bottom-sheet-header"><h3><i class="fas fa-brush"></i> Theme</h3><button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button></div>
      <div class="bottom-sheet-content">
        <div class="theme-grid-rect" id="themeGrid"></div>
        <div class="font-row-sheet"><div class="font-sheet" data-font="small">A<sup>-</sup></div><div class="font-sheet" data-font="medium">A</div><div class="font-sheet" data-font="large">A<sup>+</sup></div></div>
      </div>
    </div>
    
    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> SMART-GRADE</h3><button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chalkboard-user"></i> Dashboard</a>
        <a href="notifications.html" class="nav-item active"><i class="fas fa-bell"></i> Notifications</a>
        <a href="history.html" class="nav-item"><i class="fas fa-history"></i> History</a>
        <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i> Settings</a>
        <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </div>
    <div class="overlay" id="overlay"></div>
    
    <main class="main-content">
      
      <div class="glass-card text-center" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;">
        <i class="fas fa-bell" style="font-size:40px;opacity:0.5;"></i>
        <h2 style="color:white;margin:8px 0;">Notifications Center</h2>
        <p style="opacity:0.8;font-size:0.7rem;">All your activity notifications</p>
      </div>
      
      <div class="stats-row">
        <div class="stat-badge-sm" id="totalNotifCount"><i class="fas fa-database"></i> 0 total</div>
        <div class="stat-badge-sm" id="unreadNotifCount"><i class="fas fa-envelope"></i> 0 unread</div>
      </div>
      
      <div class="glass-card">
        <div class="action-bar">
          <div class="action-btn" onclick="markAllAsRead()"><i class="fas fa-check-double"></i> Mark all as read</div>
        </div>
        
        <div class="filter-section">
          <div class="filter-section-title"><i class="fas fa-star"></i> All Notifications</div>
          <div class="filter-grid">
            <div class="filter-chip active" data-filter="all" onclick="setFilter('all')"><i class="fas fa-bell"></i> All</div>
          </div>
        </div>
        
        <div class="filter-section">
          <div class="filter-section-title"><i class="fas fa-graduation-cap"></i> Academic</div>
          <div class="filter-grid">
            <div class="filter-chip" data-filter="grade" onclick="setFilter('grade')"><i class="fas fa-pen"></i> Grades</div>
            <div class="filter-chip" data-filter="badge" onclick="setFilter('badge')"><i class="fas fa-medal"></i> Badges</div>
            <div class="filter-chip" data-filter="streak" onclick="setFilter('streak')"><i class="fas fa-fire"></i> Streaks</div>
            <div class="filter-chip" data-filter="goal" onclick="setFilter('goal')"><i class="fas fa-bullseye"></i> Goals</div>
          </div>
        </div>
        
        <div class="filter-section">
          <div class="filter-section-title"><i class="fas fa-database"></i> Data</div>
          <div class="filter-grid">
            <div class="filter-chip" data-filter="export" onclick="setFilter('export')"><i class="fas fa-upload"></i> Export</div>
            <div class="filter-chip" data-filter="import" onclick="setFilter('import')"><i class="fas fa-download"></i> Import</div>
          </div>
        </div>
        
        <div class="filter-section">
          <div class="filter-section-title"><i class="fas fa-user"></i> Account</div>
          <div class="filter-grid">
            <div class="filter-chip" data-filter="login" onclick="setFilter('login')"><i class="fas fa-sign-in-alt"></i> Login</div>
            <div class="filter-chip" data-filter="profile" onclick="setFilter('profile')"><i class="fas fa-user"></i> Profile</div>
            <div class="filter-chip" data-filter="account" onclick="setFilter('account')"><i class="fas fa-key"></i> Security</div>
          </div>
        </div>
        
        <div id="notificationsList"></div>
      </div>
      
    </main>
  </div>
  
  <div id="toastContainer" class="toast-container"></div>
  
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    var currentUser = null;
    var currentFilter = 'all';
    var allNotifications = [];
    
    var typeConfig = {
      grade: { icon: 'fa-pen', bg: 'grade' },
      badge: { icon: 'fa-medal', bg: 'badge' },
      streak: { icon: 'fa-fire', bg: 'streak' },
      goal: { icon: 'fa-bullseye', bg: 'goal' },
      profile: { icon: 'fa-user', bg: 'profile' },
      export: { icon: 'fa-upload', bg: 'export' },
      import: { icon: 'fa-download', bg: 'import' },
      login: { icon: 'fa-sign-in-alt', bg: 'login' },
      account: { icon: 'fa-key', bg: 'account' },
      system: { icon: 'fa-bell', bg: 'system' },
      default: { icon: 'fa-bell', bg: 'system' }
    };
    
    function checkAuth() {
      try {
        var stored = localStorage.getItem('smartgrade_current');
        if (stored) {
          currentUser = JSON.parse(stored);
        } else {
          window.location.href = 'login.html';
          return false;
        }
        return true;
      } catch(e) {
        window.location.href = 'login.html';
        return false;
      }
    }
    
    function loadNotifications() {
      if (!checkAuth()) return;
      
      var saved = localStorage.getItem('smartgrade_notifications_' + currentUser.id);
      if (saved && saved !== '[]') {
        allNotifications = JSON.parse(saved);
      } else {
        allNotifications = [];
        addDemoNotifications();
      }
      
      allNotifications.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
      updateStats();
      displayNotifications();
      updateHeaderProfile();
    }
    
    function addDemoNotifications() {
      var now = new Date().toISOString();
      allNotifications = [
        { id: Date.now(), type: 'login', title: 'Welcome to SMART GRADE', body: 'Start by adding your first grade.', date: now, read: false },
        { id: Date.now()+1, type: 'grade', title: 'Grades Ready', body: 'You can now add your grades for Term 1.', date: now, read: false },
        { id: Date.now()+2, type: 'badge', title: 'Badges Available', body: 'Complete actions to unlock achievements.', date: now, read: false }
      ];
      saveNotifications();
    }
    
    function saveNotifications() {
      localStorage.setItem('smartgrade_notifications_' + currentUser.id, JSON.stringify(allNotifications));
    }
    
    function updateStats() {
      var total = allNotifications.length;
      var unread = allNotifications.filter(function(n) { return !n.read; }).length;
      var totalEl = document.getElementById('totalNotifCount');
      var unreadEl = document.getElementById('unreadNotifCount');
      if (totalEl) totalEl.innerHTML = '<i class="fas fa-database"></i> ' + total + ' total';
      if (unreadEl) unreadEl.innerHTML = '<i class="fas fa-envelope"></i> ' + unread + ' unread';
    }
    
    function formatRelativeDate(date) {
      var now = new Date();
      var diff = Math.floor((now - date) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' minutes ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
      if (diff < 604800) return Math.floor(diff / 86400) + ' days ago';
      return date.toLocaleDateString();
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    function displayNotifications() {
      var container = document.getElementById('notificationsList');
      if (!container) return;
      
      var filtered = currentFilter === 'all' ? allNotifications : allNotifications.filter(function(n) { return n.type === currentFilter; });
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet</p><p style="font-size:0.6rem;">Start using SMART GRADE to see your activity</p></div>';
        return;
      }
      
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var notif = filtered[i];
        var config = typeConfig[notif.type] || typeConfig.default;
        var isUnread = !notif.read;
        var date = new Date(notif.date);
        var formattedDate = formatRelativeDate(date);
        
        html += '<div class="notif-card ' + (isUnread ? 'unread' : '') + '" onclick="markAsRead(' + notif.id + ')">' +
          '<div class="notif-icon ' + config.bg + '"><i class="fas ' + config.icon + '"></i></div>' +
          '<div class="notif-content">' +
            '<div class="notif-title">' + escapeHtml(notif.title) + '</div>' +
            '<div class="notif-body">' + escapeHtml(notif.body) + '</div>' +
            '<div class="notif-date"><i class="fas fa-clock"></i> ' + formattedDate + '</div>' +
          '</div>' +
          (isUnread ? '<div class="unread-dot"></div>' : '') +
        '</div>';
      }
      container.innerHTML = html;
    }
    
    function markAsRead(id) {
      for (var i = 0; i < allNotifications.length; i++) {
        if (allNotifications[i].id === id) {
          allNotifications[i].read = true;
          break;
        }
      }
      saveNotifications();
      updateStats();
      displayNotifications();
    }
    
    function markAllAsRead() {
      for (var i = 0; i < allNotifications.length; i++) {
        allNotifications[i].read = true;
      }
      saveNotifications();
      updateStats();
      displayNotifications();
      showToast('All notifications marked as read');
    }
    
    function setFilter(filter) {
      currentFilter = filter;
      var chips = document.querySelectorAll('.filter-chip');
      for (var i = 0; i < chips.length; i++) {
        chips[i].classList.remove('active');
        if (chips[i].getAttribute('data-filter') === filter) {
          chips[i].classList.add('active');
        }
      }
      displayNotifications();
    }
    
    function updateHeaderProfile() {
      var headerAvatar = document.getElementById('headerAvatar');
      if (!headerAvatar || !currentUser) return;
      try {
        var profile = JSON.parse(localStorage.getItem('smartgrade_profile_' + currentUser.id) || '{}');
        if (profile.avatarBase64 && profile.avatarBase64 !== '' && profile.avatarBase64.length > 100) {
          headerAvatar.innerHTML = '<img src="' + profile.avatarBase64 + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
        } else {
          headerAvatar.innerHTML = '<i class="fas fa-user-graduate"></i>';
        }
      } catch(e) {
        headerAvatar.innerHTML = '<i class="fas fa-user-graduate"></i>';
      }
    }
    
    function applyGlobalFont() {
      var savedFont = localStorage.getItem('smartgrade_font_family') || 'inter';
      var fontMap = {
        'inter': 'Inter, sans-serif', 'roboto': 'Roboto, sans-serif', 'cinzel': 'Cinzel, serif',
        'quicksand': 'Quicksand, sans-serif', 'courier-prime': '"Courier Prime", monospace',
        'fredoka': 'Fredoka, sans-serif', 'pacifico': 'Pacifico, cursive', 'bangers': 'Bangers, cursive',
        'lobster': 'Lobster, cursive', 'permanent-marker': '"Permanent Marker", cursive',
        'comfortaa': 'Comfortaa, sans-serif', 'righteous': 'Righteous, sans-serif'
      };
      document.body.style.fontFamily = fontMap[savedFont] || 'Inter, sans-serif';
    }
    
    function showToast(message) {
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = '<i class="fas fa-info-circle"></i> ' + message;
      container.appendChild(toast);
      setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3000);
    }
    
    window.markAsRead = markAsRead;
    window.markAllAsRead = markAllAsRead;
    window.setFilter = setFilter;
    
    loadNotifications();
    initMobileMenu();
    initThemeSelector();
    applyGlobalFont();
    
    var fontObserver = new MutationObserver(function() { applyGlobalFont(); });
    fontObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
  </script>
</body>
</html>
