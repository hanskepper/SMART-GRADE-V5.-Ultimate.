# ============================================
# SMART GRADE - Jekyll Configuration
# ============================================

title: SMART GRADE
description: Ultimate Grade Management System for SIN GBHS FOUMBAN - Form 5B Science
url: https://hanskepper.github.io/SMART-GRADE-V5.-Ultimate.
baseurl: /SMART-GRADE-V5.-Ultimate.

# ============================================
# THÈME JEKYLL
# ============================================

remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# ============================================
# PERSONNALISATION - COULEUR ORANGE
# ============================================

theme_color: "#e67e22"

# ============================================
# PARAMÈTRES GÉNÉRAUX
# ============================================

permalink: pretty
markdown: kramdown
highlighter: rouge

exclude:
  - node_modules
  - .git
  - .github
  - vendor
  - README.md
  - LICENSE.md
  - SECURITY.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - .gitignore

lang: en
author: HANS KEPPER
email: hanskepper52@gmail.com
